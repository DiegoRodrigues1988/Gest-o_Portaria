name: gestao_portaria
description: "Aplicativo de gerenciamento de encomendas para portaria."
# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database local
  sqflite: ^2.2.8
  sqflite_common_ffi: ^2.2.0
  sqlite3_flutter_libs: ^0.5.10

  # Camera / Imagens
  camera: ^0.11.2+1
  camera_windows: ^0.2.6+4
  image_picker: ^1.2.1
  path: ^1.8.3

  # Abrir links externos
  url_launcher: ^6.1.10

  # Documentos PDF
  pdf: ^3.11.0
  printing: ^5.11.0

  # Path para salvar arquivos
  path_provider: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
